description: |-

CLASSIFIED — UNIT 2A7 CYBER INVESTIGATIONS DIVISION
REF: OPS-2025-BAKLAWA | CLASSIFICATION: RESTRICTED
On the morning of March 14th, 2025, the Tunis-based fintech company Medina Tech Solutions 
filed an emergency report with the National Cybersecurity Agency. Overnight, 
their entire client database — 40,247 financial records — had been silently exfiltrated 
from their internal servers between 02:13 and 02:47 AM.
No external breach signatures. No forced entry. No alarm triggered.
Someone who knew exactly where to look, exactly when to move, and exactly how to clean up after themselves 
had walked straight through the front door.
At 06:00 AM, a message arrived in the company's admin inbox. It was taunting. It was precise. And it was signed — 
but not with a name anyone recognized.
Unit 2A7 has been activated. Five employees have been flagged as persons of interest based on their 
access levels, schedules, and behavioral patterns in the weeks leading up to the breach. Personnel files 
have been recovered and are ready for review.
You are the investigator. You have the files. You have the timestamps. You have a signature that means nothing — yet.
Figure out who was really inside that network. Before they're gone for good.
— Riadh Kchouk, Unit 2A7 Cyber Investigations Division


description: |-

[UNIT 2A7 — TASK BRIEFING 01]
Before you chase anyone, you need to know everyone.
We have recovered the full personnel dossiers of the five employees currently 
under investigation. Each file contains their CV, their work schedule, and a sample 
of their professional email communications.
Read everything. Every line. Investigators who skim miss things — and in this case, 
missing things costs you the whole operation.
Something in these files will tell you exactly who had access to the server 
between 02:13 and 02:47 AM on the night of March 13th. Find that person.
